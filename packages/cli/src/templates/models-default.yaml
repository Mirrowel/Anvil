# ~/.anvil/models.yaml — generated by `anvil doctor --bootstrap-models`.
# Edit freely; re-running doctor only writes this file when it doesn't exist
# and never overwrites your changes.
#
# Schema:
#   - id              (str)         model id passed to the provider
#   - provider        (enum)        ollama | claude | openai | gemini | openrouter | gemini-cli | adk
#   - tier            (enum)        local | cheap | premium
#   - capabilities    (str array)   subset of [embed, rerank, code, reasoning, vision]
#   - complexity_max  (enum)        S | M | L
#   - vram_gb         (number)      0 for cloud / CPU-only models
#   - exclusive_slot  (bool)        true ⇒ goes through process-local FIFO queue
#                                   (only big GPU-resident locals; embed/rerank stay false)
#   - context_tokens  (int, opt)    minimum-context filter
#   - consumed_by     (enum, opt)   agent-core (default) | knowledge-core
#                                   marker: model is referenced in registry
#                                   but invoked directly by knowledge-core,
#                                   not the resolver

models:
  # ─── Big-model GPU slot (one resident at a time on 16 GB) ─────────────
  - id: qwen2.5-coder:7b
    provider: ollama
    tier: local
    capabilities: [code, reasoning]
    complexity_max: M
    vram_gb: 5
    exclusive_slot: true

  - id: gemma3:4b
    provider: ollama
    tier: local
    capabilities: [vision, code]
    complexity_max: S
    vram_gb: 3.5
    exclusive_slot: true

  # ─── Co-resident utility models, used by knowledge-core directly ──────
  - id: nomic-embed-text
    provider: ollama
    tier: local
    capabilities: [embed]
    complexity_max: S
    vram_gb: 0.3
    exclusive_slot: false
    consumed_by: knowledge-core

  - id: qwen3:0.6b
    provider: ollama
    tier: local
    capabilities: [rerank]
    complexity_max: S
    vram_gb: 0.5
    exclusive_slot: false
    consumed_by: knowledge-core

  # ─── Premium escalation tier (cloud) ──────────────────────────────────
  - id: claude-haiku-4-5-20251001
    provider: claude
    tier: cheap
    capabilities: [code, reasoning]
    complexity_max: M
    vram_gb: 0
    exclusive_slot: false

  - id: claude-sonnet-4-6
    provider: claude
    tier: premium
    capabilities: [code, reasoning, vision]
    complexity_max: L
    vram_gb: 0
    exclusive_slot: false

  - id: claude-opus-4-7
    provider: claude
    tier: premium
    capabilities: [code, reasoning, vision]
    complexity_max: L
    vram_gb: 0
    exclusive_slot: false
